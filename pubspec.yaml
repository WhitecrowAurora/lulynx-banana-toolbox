name: nano_banana_app
description: AI Image Generation Client for Nano Banana API

publish_to: 'none'

version: 1.6.9+69

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # HTTP Client
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2

  # Share
  share_plus: ^7.2.2

  # Shake detection
  shake: ^2.2.0

  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  file_picker: ^6.1.1
  photo_manager: ^3.0.0
  image: ^4.2.0

  # UI
  cupertino_icons: ^1.0.6

  # File Operations
  path_provider: ^2.1.2
  path: ^1.8.3
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.2

  # Database
  sqflite: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icons/app_icon.png
  min_sdk_android: 21

